name: Build ROM

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build-rom:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install toolchain from rust-toolchain.toml
        uses: mkroening/rust-toolchain-toml@v1.3.5

      - name: Install stable toolchain for nust64
        run: rustup toolchain install stable --profile minimal

      - name: Install nust64
        run: cargo +stable install nust64 --locked

      - name: Build ROM
        run: cargo run --release

      - name: Upload ROM artifact
        uses: actions/upload-artifact@v6
        with:
          name: n64-systemtest-z64
          path: target/mips-nintendo64-none/release/n64-systemtest.z64
          if-no-files-found: error
